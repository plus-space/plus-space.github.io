<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>+SPACE</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #f5f5f5;
  overflow-x: hidden;
  font-family: Arial, Helvetica, sans-serif;
}

/* TOP BLACK BAR */

.top-bar {
  width: 100%;
  height: 42px;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.top-menu {
  display: flex;
  gap: 22px;
  align-items: center;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.top-menu a {
  color: #7d7d7d;
  text-decoration: none;
  transition: all 0.35s ease;
  position: relative;
}

.top-menu a:hover {
  color: white;
  transform: translateY(-1px);
}

.top-menu a::after {
  content: '';
  position: absolute;
  left: 0;
  bottom: -3px;
  width: 0%;
  height: 1px;
  background: white;
  transition: 0.35s ease;
}

.top-menu a:hover::after {
  width: 100%;
}

/* LOGO AREA */

.logo-wrap {
  width: 100%;
  display: flex;
  justify-content: center;
  padding-top: 20px;
}

.logo {
  font-size: clamp(80px, 8vw, 150px);
  font-weight: 900;
  letter-spacing: -6px;
  color: black;
  text-transform: uppercase;
  line-height: 1;
  cursor: default;
  transition: transform .5s ease;
}

.logo:hover {
  transform: scale(1.015);
}

/* subtle flicker */

@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: .96;}
  100% {opacity: 1;}
}

.logo {
  animation: flicker 4s infinite ease-in-out;
}

.empty-space {
  height: 80vh;
}
</style>
</head>

<body>

<div class="top-bar">
  <nav class="top-menu">
    <a href="#">DESERTOUT</a>
    <a href="#">ANTI-FASHION</a>
    <a href="#">RECONSTRUCTION</a>
    <a href="#">PROTOTYPE</a>
    <a href="#">BRANDBOOK</a>
  </nav>
</div>

<div class="logo-wrap">
  <div class="logo">+SPACE</div>
</div>

<div class="empty-space"></div>

</body>
</html>
