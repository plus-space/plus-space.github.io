<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLUS SPACE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f0f0f;
color:#F4E3C1;
font-family:Arial, sans-serif;
overflow-x:hidden;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.logo{
font-size:clamp(50px,9vw,140px);
letter-spacing:12px;
text-transform:uppercase;
font-weight:700;
}

.subtitle{
margin-top:20px;
font-size:12px;
letter-spacing:4px;
opacity:.7;
text-transform:uppercase;
}

section{
padding:100px 10%;
border-top:1px solid rgba(255,255,255,.08);
}

.label{
font-size:12px;
letter-spacing:3px;
opacity:.5;
margin-bottom:20px;
text-transform:uppercase;
}

.manifesto{
font-size:clamp(26px,4vw,48px);
line-height:1.3;
max-width:900px;
}

.small-text{
margin-top:30px;
max-width:700px;
opacity:.7;
line-height:1.7;
}
</style>
</head>

<body>

<section class="hero">
<div>
<div class="logo">
PLUS SPACE
</div>

<div class="subtitle">
FASHION DIED / RECONSTRUCTION STARTED
</div>
</div>
</section>

<section>
<div class="label">
Manifesto
</div>

<div class="manifesto">
We are not selling clothing.  
We are rebuilding meaning.
</div>

<div class="small-text">
Anti-fast-fashion project focused on reconstruction,
restock, distress and emotional design language.
</div>
</section>

</body>
</html>
