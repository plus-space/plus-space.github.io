<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>+SPACE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#f5f5f3;
color:#000;
overflow-x:hidden;
}

/* ---------------- */
/* TOP BAR */
/* ---------------- */

.topbar{
position:fixed;
top:0;
left:0;
width:100%;
height:42px;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.topnav{
display:flex;
gap:28px;
}

.topnav a{
font-size:12px;
font-weight:700;
letter-spacing:.08em;
text-transform:uppercase;
text-decoration:none;
color:#8e8e8e;
position:relative;
transition:.3s ease;
}

.topnav a:hover{
color:#fff;
}

.topnav a::after{
content:'';
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:1px;
background:#fff;
transition:.3s ease;
}

.topnav a:hover::after{
width:100%;
}

/* ---------------- */
/* PAGE */
/* ---------------- */

.hero{
min-height:200vh;
padding:90px 6vw 0;
position:relative;
}

/* ---------------- */
/* LOGO */
/* ---------------- */

.logo-wrap{
display:flex;
justify-content:center;
margin-bottom:70px;
}

.logo{
font-size:clamp(90px,9vw,180px);
font-weight:900;
letter-spacing:-0.08em;
line-height:.9;
animation:flicker 5s infinite ease-in-out;
}

@keyframes flicker{
0%,100%{
opacity:1;
}
50%{
opacity:.97;
}
}

/* ---------------- */
/* LAYOUT */
/* ---------------- */

.grid{
display:grid;
grid-template-columns:
320px
1fr
320px;

gap:6vw;
align-items:start;
}

/* image blocks */

.visual{
width:320px;
height:320px;
background:#ececec;
border:1px solid rgba(0,0,0,.05);
position:relative;
overflow:hidden;
transition:.4s ease;
}

.visual:hover{
transform:translateY(-5px);
}

.visual-label{
position:absolute;
bottom:18px;
left:18px;
font-size:10px;
font-weight:700;
letter-spacing:.16em;
opacity:.28;
}

/* center copy */

.copy{
padding-top:45px;
max-width:520px;
}

.copy-line{
height:8px;
background:#d9d9d9;
border-radius:999px;
margin-bottom:18px;
opacity:.65;
}

.copy-line:nth-child(1){
width:100%;
}

.copy-line:nth-child(2){
width:84%;
}

.copy-line:nth-child(3){
width:68%;
}

.copy-line:nth-child(4){
width:93%;
}

.copy-line:nth-child(5){
width:58%;
}

/* ---------------- */
/* SECOND BLOCK */
/* ---------------- */

.bottom-layout{
margin-top:180px;
display:flex;
justify-content:flex-end;
}

.right-visual{
width:320px;
height:320px;
background:#ececec;
border:1px solid rgba(0,0,0,.05);
position:relative;
transition:.4s ease;
}

.right-visual:hover{
transform:translateY(-5px);
}

/* ---------------- */
/* METALLIC PLUS */
/* ---------------- */

.plus-wrap{
position:fixed;
left:-40px;
bottom:-45px;
z-index:2;
pointer-events:none;
}

.plus{
width:150px;
height:150px;
position:relative;
transition:transform .08s linear;
}

/* vertical */

.plus::before{
content:'';
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:42px;
height:150px;
border-radius:4px;

background:
linear-gradient(
145deg,
#ffffff 0%,
#d3d3d3 12%,
#7a7a7a 24%,
#efefef 42%,
#4b4b4b 58%,
#ffffff 74%,
#767676 100%
);

box-shadow:
inset 8px 8px 14px rgba(255,255,255,.35),
inset -8px -8px 14px rgba(0,0,0,.22),
0 12px 22px rgba(0,0,0,.14);
}

/* horizontal */

.plus::after{
content:'';
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:150px;
height:42px;
border-radius:4px;

background:
linear-gradient(
145deg,
#ffffff 0%,
#d3d3d3 12%,
#7a7a7a 24%,
#efefef 42%,
#4b4b4b 58%,
#ffffff 74%,
#767676 100%
);

box-shadow:
inset 8px 8px 14px rgba(255,255,255,.35),
inset -8px -8px 14px rgba(0,0,0,.22),
0 12px 22px rgba(0,0,0,.14);
}

/* ---------------- */
/* MOBILE */
/* ---------------- */

@media(max-width:1000px){

.grid{
grid-template-columns:1fr;
gap:50px;
}

.visual,
.right-visual{
width:100%;
height:280px;
}

.bottom-layout{
justify-content:center;
margin-top:80px;
}

.logo{
font-size:24vw;
}

.plus-wrap{
left:-35px;
bottom:-35px;
}

.plus{
transform:scale(.8);
}

}

</style>
</head>

<body>

<!-- TOP BAR -->

<header class="topbar">
<nav class="topnav">

<a href="#">DESERTOUT</a>
<a href="#">ANTI-FASHION</a>
<a href="#">RECONSTRUCTION</a>
<a href="#">PROTOTYPE</a>
<a href="#">BRANDBOOK</a>

</nav>
</header>

<!-- METAL PLUS -->

<div class="plus-wrap">
<div class="plus"></div>
</div>

<!-- HERO -->

<section class="hero">

<!-- LOGO -->

<div class="logo-wrap">
<div class="logo">+SPACE</div>
</div>

<!-- GRID -->

<div class="grid">

<!-- LEFT VISUAL -->

<div class="visual">
<div class="visual-label">
VISUAL 001
</div>
</div>

<!-- TEXT -->

<div class="copy">

<div class="copy-line"></div>
<div class="copy-line"></div>
<div class="copy-line"></div>
<div class="copy-line"></div>
<div class="copy-line"></div>

</div>

<!-- RIGHT EMPTY -->

<div></div>

</div>

<!-- LOWER RIGHT VISUAL -->

<div class="bottom-layout">

<div class="right-visual">
<div class="visual-label">
VISUAL 002
</div>
</div>

</div>

</section>

<script>

const plus =
document.querySelector('.plus');

window.addEventListener('scroll',()=>{

const scroll =
window.scrollY;

const rotation =
scroll * .22;

plus.style.transform =
`rotate(${rotation}deg)`;

});

</script>

</body>
</html>
