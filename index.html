<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>PLUS SPACE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
background:#000;
overflow:hidden;
font-family:'Inter',sans-serif;
cursor:default;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
}

.logo{
font-size:clamp(70px,14vw,260px);
font-weight:900;
letter-spacing:-0.08em;
line-height:.9;
text-transform:uppercase;
color:#fff;
position:relative;
animation:flicker 3s infinite;
user-select:none;
}

/* subtle negative flash */

@keyframes flicker{

0%{
color:#fff;
filter:invert(0);
opacity:1;
}

6%{
color:#000;
filter:invert(1);
opacity:1;
}

8%{
color:#fff;
filter:invert(0);
}

34%{
color:#fff;
}

36%{
color:#000;
filter:invert(1);
}

38%{
color:#fff;
filter:invert(0);
}

73%{
color:#fff;
}

75%{
color:#000;
filter:invert(1);
}

77%{
color:#fff;
filter:invert(0);
}

100%{
color:#fff;
}
}

.subtext{
position:absolute;
bottom:60px;
left:50%;
transform:translateX(-50%);
font-size:10px;
letter-spacing:.45em;
text-transform:uppercase;
color:#8f8f8f;
white-space:nowrap;
}

</style>
</head>

<body>

<section class="hero">

<div class="logo">
PLUS SPACE
</div>

<div class="subtext">
Fashion died / reconstruction started
</div>

</section>

</body>
</html>
